<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battle Royale - Qutibah</title>
<style>
/* تم إصلاح مشكلة اللمس هنا */
html, body { overscroll-behavior-y: none; }
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
body { background: #0a0f0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
#gameCanvas { display: block; }
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

/* HUD */
#healthBar { position: absolute; bottom: 180px; left: 30px; width: 180px; }
#healthLabel { color: #fff; font-size: 14px; margin-bottom: 6px; text-shadow: 0 0 6px #000; font-weight: bold; }
#healthBg { background: rgba(0,0,0,0.6); border-radius: 8px; height: 16px; overflow: hidden; border: 2px solid #555; }
#healthFill { background: linear-gradient(90deg,#e74c3c,#e67e22); height: 100%; border-radius: 6px; transition: width 0.3s; }
#ammoHud { position: absolute; bottom: 180px; right: 30px; color: #fff; font-size: 26px; font-weight: bold; text-shadow: 0 0 8px #000; text-align: right; }
#ammoHud span { font-size: 14px; color: #aaa; display: block; }
#killsHud { position: absolute; top: 20px; left: 20px; color: #ffd700; font-size: 18px; font-weight: bold; text-shadow: 0 0 8px #000; }
#aliveHud { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 18px; text-shadow: 0 0 8px #000; text-align: right; font-weight: bold; }
#zoneHud { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); color: #ff6b6b; font-size: 16px; font-weight: bold; text-shadow: 0 0 6px #000; }

/* أزرار التحكم للتلفون */
#controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: all; }
#joystickZone { position: absolute; bottom: 30px; left: 30px; width: 150px; height: 150px; }
#joystickBase { width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); position: absolute; }
#joystickKnob { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.8); position: absolute; top: 45px; left: 45px; transition: none; }

#btnShoot { position: absolute; bottom: 40px; right: 30px; width: 90px; height: 90px; border-radius: 50%; background: rgba(231,76,60,0.8); border: 4px solid rgba(231,76,60,1); color: #fff; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: all; box-shadow: 0 0 20px rgba(231,76,60,0.5); flex-direction: column; }
#btnShoot.active { background: rgba(231,76,60,1); transform: scale(0.9); }

#btnReload { position: absolute; bottom: 40px; right: 140px; width: 60px; height: 60px; border-radius: 50%; background: rgba(52,152,219,0.8); border: 3px solid rgba(52,152,219,1); color: #fff; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: all; }
#btnReload.active { transform: scale(0.9); }

#btnAim { position: absolute; bottom: 120px; right: 120px; width: 60px; height: 60px; border-radius: 50%; background: rgba(46,204,113,0.8); border: 3px solid rgba(46,204,113,1); color: #fff; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: all; }
#btnAim.toggle { background: rgba(46,204,113,1); box-shadow: 0 0 15px rgba(46,204,113,0.8); }

/* الشاشات */
#startScreen, #gameoverScreen { position: fixed; top:0;left:0;width:100%;height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; color: #fff; text-align: center; padding: 20px; pointer-events: all; }
#startScreen h1 { font-size: 40px; color: #ffd700; text-shadow: 0 0 20px #ffd700; margin-bottom: 10px; }
#startScreen p { color: #ccc; font-size: 16px; margin-bottom: 30px; }
#gameoverScreen { display: none; }
#gameoverScreen h1 { font-size: 36px; margin-bottom: 15px; }

.bigBtn { background: linear-gradient(135deg,#e74c3c,#c0392b); border: none; color: #fff; padding: 18px 50px; border-radius: 35px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 20px rgba(231,76,60,0.6); touch-action: manipulation; pointer-events: auto; }

/* الشخصيات */
.char-container { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; width: 100%; max-width: 400px; flex-wrap: wrap; }
.char-btn { flex: 1; min-width: 100px; padding: 12px; background: #222; border: 3px solid #444; border-radius: 12px; cursor: pointer; transition: 0.2s; color: white; font-size: 16px; font-weight: bold; touch-action: manipulation; pointer-events: auto; }
.char-btn small { display: block; font-size: 12px; color: #aaa; margin-top: 5px; font-weight: normal; }
.char-btn.active { border-color: #ffd700; background: #333; transform: scale(1.08); box-shadow: 0 0 15px rgba(255,215,0,0.3); }

#reloadIndicator { position: absolute; bottom: 240px; right: 30px; color: #3498db; font-size: 15px; font-weight: bold; display: none; animation: blink 0.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
#crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 30px; height: 30px; pointer-events: none; display: none; }
#crosshair::before, #crosshair::after { content:''; position: absolute; background: rgba(255,255,255,0.9); }
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
#dmgFlash { position: fixed; top:0;left:0;width:100%;height:100%; background: rgba(231,76,60,0); pointer-events: none; z-index: 45; transition: background 0.1s; }

/* الميني ماب */
#minimap { position: absolute; top: 80px; right: 20px; width: 100px; height: 100px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.4); overflow: hidden; background: rgba(0,0,0,0.6); }
#minimapCanvas { width: 100px; height: 100px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="dmgFlash"></div>

<div id="ui">
  <div id="killsHud">🔫 Kills: <span id="killsVal">0</span></div>
  <div id="aliveHud">👥 Alive: <span id="aliveVal">20</span></div>
  <div id="zoneHud">⚠️ Zone closing in <span id="zoneTimer">45</span>s</div>
  <div id="healthBar">
    <div id="healthLabel">❤️ HP: <span id="hpVal">100</span></div>
    <div id="healthBg"><div id="healthFill" style="width:100%"></div></div>
  </div>
  <div id="ammoHud"><span>AMMO</span><span id="ammoVal">30</span>/<span id="ammoMax">30</span></div>
  <div id="reloadIndicator">🔄 جاري إعادة التحميل...</div>
  <div id="minimap"><canvas id="minimapCanvas" width="100" height="100"></canvas></div>
  <div id="crosshair"></div>
  
  <div id="controls">
    <div id="joystickZone">
      <div id="joystickBase"></div>
      <div id="joystickKnob"></div>
    </div>
    <div id="btnShoot" ontouchstart="startShoot(event)" ontouchend="stopShoot(event)">🔫<br>Fire</div>
    <div id="btnReload" ontouchstart="reloadGun(event)">🔄<br>Reload</div>
    <div id="btnAim" ontouchstart="toggleAim(event)">🎯<br>Aim</div>
  </div>
</div>

<div id="startScreen">
  <h1>⚔️ Battle Royale</h1>
  <p>جاهز للميدان؟ آخر لاعب يبقى يفوز!</p>
  
  <div class="char-container">
    <div class="char-btn active" onclick="selectChar(0)" ontouchstart="selectChar(0)" id="char0">🔵 متوازن<br><small>دم 100 | سرعة عادية</small></div>
    <div class="char-btn" onclick="selectChar(1)" ontouchstart="selectChar(1)" id="char1">🟢 مدرّع<br><small>دم 150 | بطيء</small></div>
    <div class="char-btn" onclick="selectChar(2)" ontouchstart="selectChar(2)" id="char2">🟣 نينجا<br><small>دم 80 | سريع</small></div>
  </div>

  <button class="bigBtn" onclick="startGame()" ontouchstart="startGame()">▶ العب الآن</button>
</div>

<div id="gameoverScreen">
  <h1 id="goTitle">💀 خرجت!</h1>
  <p id="goStats"></p>
  <button class="bigBtn" onclick="startGame()" ontouchstart="startGame()">🔄 العب مجدداً</button>
</div>

<script>
window.oncontextmenu = function(event) {
     event.preventDefault();
     event.stopPropagation();
     return false;
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const charStats = [
    { id: 0, speed: 3.2, maxHp: 100, color: '#2471a3', aimColor: '#1a5276' },
    { id: 1, speed: 2.2, maxHp: 150, color: '#27ae60', aimColor: '#1e8449' },
    { id: 2, speed: 4.5, maxHp: 80,  color: '#8e44ad', aimColor: '#6c3483' }
];
let selectedChar = charStats[0];

function selectChar(idx) {
    selectedChar = charStats[idx];
    document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('char' + idx).classList.add('active');
}

let game = {};
const WORLD = 2000;
const TILE = 60;
const TREE_COUNT = 120;
const ROCK_COUNT = 60;
const HOUSE_COUNT = 15;
const ENEMY_COUNT = 19;

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameoverScreen').style.display = 'none';
  initGame();
}

function initGame() {
  game = {
    player: { x: WORLD/2, y: WORLD/2, angle: 0, hp: selectedChar.maxHp, maxHp: selectedChar.maxHp, speed: selectedChar.speed, color: selectedChar.color, aimColor: selectedChar.aimColor, ammo: 30, maxAmmo: 30, kills: 0, alive: true, reloading: false, reloadTime: 0, aiming: false, shootCooldown: 0 },
    enemies: [],
    bullets: [],
    particles: [],
    trees: [],
    rocks: [],
    houses: [],
    zone: { x: WORLD/2, y: WORLD/2, r: WORLD*0.85, targetR: WORLD*0.5, timer: 45, phase: 1, shrinking: false, dmgTimer: 0 },
    kills: 0,
    alive: ENEMY_COUNT + 1,
    running: true,
    joystick: { active: false, dx: 0, dy: 0, startX: 0, startY: 0, id: -1 },
    shooting: false,
    cam: { x: WORLD/2, y: WORLD/2 }
  };

  for (let i = 0; i < TREE_COUNT; i++) { game.trees.push({ x: Math.random()*WORLD, y: Math.random()*WORLD, r: 18+Math.random()*14, type: Math.random()<0.5?0:1 }); }
  for (let i = 0; i < ROCK_COUNT; i++) { game.rocks.push({ x: Math.random()*WORLD, y: Math.random()*WORLD, r: 14+Math.random()*12 }); }
  for (let i = 0; i < HOUSE_COUNT; i++) { game.houses.push({ x: 100+Math.random()*(WORLD-200), y: 100+Math.random()*(WORLD-200), w: 80+Math.random()*60, h: 80+Math.random()*60 }); }

  for (let i = 0; i < ENEMY_COUNT; i++) {
    let ex, ey;
    do { ex = 100+Math.random()*(WORLD-200); ey = 100+Math.random()*(WORLD-200); }
    while (Math.hypot(ex-WORLD/2, ey-WORLD/2) < 300);
    game.enemies.push({ x: ex, y: ey, hp: 80+Math.random()*40, maxHp: 100, angle: Math.random()*Math.PI*2, speed: 0.6+Math.random()*0.3, alive: true, shootTimer: 60+Math.random()*100, moveTimer: 0, targetX: ex, targetY: ey, state: 'patrol', alertTimer: 0 });
  }
  updateHUD();
  if (!game._loopStarted) { game._loopStarted = true; loop(); }
}

function updateHUD() {
  const p = game.player;
  document.getElementById('hpVal').textContent = Math.max(0,Math.round(p.hp));
  document.getElementById('healthFill').style.width = Math.max(0,p.hp/p.maxHp*100)+'%';
  document.getElementById('ammoVal').textContent = p.ammo;
  document.getElementById('ammoMax').textContent = p.maxAmmo;
  document.getElementById('killsVal').textContent = game.kills;
  document.getElementById('aliveVal').textContent = game.alive;
  document.getElementById('zoneTimer').textContent = Math.ceil(game.zone.timer);
}

const jZone = document.getElementById('joystickZone');
const jKnob = document.getElementById('joystickKnob');

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = jZone.getBoundingClientRect();
  game.joystick.active = true;
  game.joystick.id = t.identifier;
  game.joystick.startX = r.left + r.width/2;
  game.joystick.startY = r.top + r.height/2;
  moveJoystick(t.clientX, t.clientY);
}, {passive:false});

jZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === game.joystick.id) moveJoystick(t.clientX, t.clientY);
  }
}, {passive:false});

jZone.addEventListener('touchend', e => {
  e.preventDefault();
  game.joystick.active = false;
  game.joystick.dx = 0;
  game.joystick.dy = 0;
  jKnob.style.transform = 'translate(0,0)';
}, {passive:false});

function moveJoystick(cx, cy) {
  const dx = cx - game.joystick.startX;
  const dy = cy - game.joystick.startY;
  const dist = Math.hypot(dx, dy);
  const maxR = 45;
  const clampedDist = Math.min(dist, maxR);
  const angle = Math.atan2(dy, dx);
  const nx = Math.cos(angle)*clampedDist;
  const ny = Math.sin(angle)*clampedDist;
  jKnob.style.transform = `translate(${nx}px,${ny}px)`;
  game.joystick.dx = Math.cos(angle) * (clampedDist/maxR);
  game.joystick.dy = Math.sin(angle) * (clampedDist/maxR);
  if (dist > 0.1) game.player.angle = angle;
}

function startShoot(e) { e.preventDefault(); document.getElementById('btnShoot').classList.add('active'); game.shooting = true; }
function stopShoot(e) { e.preventDefault(); document.getElementById('btnShoot').classList.remove('active'); game.shooting = false; }

function reloadGun(e) {
  e.preventDefault();
  const p = game.player;
  if (p.reloading || p.ammo === p.maxAmmo) return;
  p.reloading = true;
  p.reloadTime = 120;
  document.getElementById('reloadIndicator').style.display = 'block';
  document.getElementById('btnReload').classList.add('active');
}

function toggleAim(e) {
  e.preventDefault();
  game.player.aiming = !game.player.aiming;
  document.getElementById('btnAim').classList.toggle('toggle', game.player.aiming);
  document.getElementById('crosshair').style.display = game.player.aiming ? 'block' : 'none';
}

function shoot(shooter, angle, isPlayer) {
  const speed = 12;
  game.bullets.push({
    x: shooter.x, y: shooter.y,
    vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
    life: 60, isPlayer, dmg: isPlayer ? (game.player.aiming?35:22) : 15,
    shooter: shooter,
    trail: []
  });
  for (let i=0;i<5;i++) {
    game.particles.push({ x:shooter.x, y:shooter.y, vx:(Math.random()-.5)*4+Math.cos(angle)*3, vy:(Math.random()-.5)*4+Math.sin(angle)*3, life:8, col:'#ffd700', r:3 });
  }
}

function spawnBlood(x,y) {
  for (let i=0;i<8;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    game.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20,col:'#c0392b',r:3});
  }
}

function updateGame() {
  const p = game.player;
  if (!p.alive) return;

  const spd = p.aiming ? p.speed*0.55 : p.speed;
  if (game.joystick.active) {
    const nx = p.x + game.joystick.dx * spd;
    const ny = p.y + game.joystick.dy * spd;
    if (nx > 10 && nx < WORLD-10) p.x = nx;
    if (ny > 10 && ny < WORLD-10) p.y = ny;
  }

  if (p.shootCooldown > 0) p.shootCooldown--;
  if (game.shooting && !p.reloading && p.ammo > 0 && p.shootCooldown <= 0) {
    shoot(p, p.angle, true);
    p.ammo--;
    p.shootCooldown = p.aiming ? 12 : 8;
    updateHUD();
    if (p.ammo === 0) reloadGun({preventDefault:()=>{}});
  }
  if (p.reloading) {
    p.reloadTime--;
    if (p.reloadTime <= 0) {
      p.ammo = p.maxAmmo;
      p.reloading = false;
      document.getElementById('reloadIndicator').style.display = 'none';
      document.getElementById('btnReload').classList.remove('active');
      updateHUD();
    }
  }

  game.bullets = game.bullets.filter(b => {
    b.trail.push({x:b.x,y:b.y});
    if (b.trail.length > 5) b.trail.shift();
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x<0||b.x>WORLD||b.y<0||b.y>WORLD) return false;

    let hit = false;
    if (b.shooter !== p && p.alive && Math.hypot(b.x-p.x, b.y-p.y) < 16) {
        p.hp -= b.dmg;
        spawnBlood(p.x, p.y);
        document.getElementById('dmgFlash').style.background = 'rgba(231,76,60,0.4)';
        setTimeout(()=>document.getElementById('dmgFlash').style.background='rgba(231,76,60,0)',150);
        updateHUD();
        if (p.hp <= 0) { p.alive = false; gameOver(false); }
        return false;
    }

    for (const en of game.enemies) {
      if (!en.alive || b.shooter === en) continue;
      if (Math.hypot(b.x-en.x, b.y-en.y) < 18) {
        en.hp -= b.dmg;
        spawnBlood(en.x, en.y);
        en.state = 'chase'; en.alertTimer = 150;
        if (en.hp <= 0) {
          en.alive = false;
          if (b.isPlayer) game.kills++;
          game.alive--;
          updateHUD();
          for (let i=0;i<15;i++) {
            const a=Math.random()*Math.PI*2;
            game.particles.push({x:en.x,y:en.y,vx:Math.cos(a)*(1+Math.random()*3),vy:Math.sin(a)*(1+Math.random()*3),life:30,col:'#e74c3c',r:4});
          }
        }
        hit = true; break;
      }
    }
    return !hit;
  });

  let allTargets = game.enemies.filter(e => e.alive);
  if (p.alive) allTargets.push(p);

  for (const en of game.enemies) {
    if (!en.alive) continue;
    
    let closestDist = Infinity;
    let target = null;

    for (const t of allTargets) {
        if (t === en) continue;
        let d = Math.hypot(en.x - t.x, en.y - t.y);
        if (d < closestDist) {
            closestDist = d;
            target = t;
        }
    }

    if (target && closestDist < 250) en.state = 'chase';
    if (en.alertTimer > 0) en.alertTimer--;
    if (en.alertTimer <= 0 && closestDist > 350) en.state = 'patrol';

    if (en.state === 'chase' && target) {
      const ang = Math.atan2(target.y-en.y, target.x-en.x);
      en.angle = ang;
      if (closestDist > 150) {
        en.x += Math.cos(ang)*en.speed;
        en.y += Math.sin(ang)*en.speed;
      }
      en.shootTimer--;
      if (en.shootTimer <= 0 && closestDist < 300) {
        const spread = (Math.random()-.5)*0.3;
        shoot(en, ang+spread, false);
        en.shootTimer = 70+Math.random()*90;
      }
    } else {
      en.moveTimer--;
      if (en.moveTimer <= 0) {
        en.targetX = 100+Math.random()*(WORLD-200);
        en.targetY = 100+Math.random()*(WORLD-200);
        en.moveTimer = 150+Math.random()*200;
      }
      const ang = Math.atan2(en.targetY-en.y, en.targetX-en.x);
      en.x += Math.cos(ang)*en.speed;
      en.y += Math.sin(ang)*en.speed;
      en.angle = ang;
    }

    const dz = Math.hypot(en.x-game.zone.x, en.y-game.zone.y);
    if (dz > game.zone.r) en.hp -= 0.3;
    if (en.hp <= 0) { en.alive = false; game.alive--; updateHUD(); }
  }

  game.zone.timer -= 1/60;
  if (game.zone.timer <= 0) {
    game.zone.timer = 30;
    game.zone.shrinking = true;
    game.zone.targetR = game.zone.r * 0.65;
    game.zone.phase++;
  }
  if (game.zone.shrinking) {
    game.zone.r = game.zone.r * 0.996 + game.zone.targetR * 0.004;
    if (Math.abs(game.zone.r - game.zone.targetR) < 1) game.zone.shrinking = false;
  }
  document.getElementById('zoneTimer').textContent = Math.ceil(game.zone.timer);

  const distZone = Math.hypot(p.x-game.zone.x, p.y-game.zone.y);
  if (distZone > game.zone.r) {
    p.hp -= 0.2;
    updateHUD();
    if (p.hp <= 0) { p.alive = false; gameOver(false); }
  }

  game.particles = game.particles.filter(pt => {
    pt.x+=pt.vx; pt.y+=pt.vy; pt.life--; pt.vx*=0.92; pt.vy*=0.92; return pt.life>0;
  });

  if (game.alive <= 1 && p.alive) { gameOver(true); }

  game.cam.x += (p.x - game.cam.x)*0.15;
  game.cam.y += (p.y - game.cam.y)*0.15;
}

function gameOver(won) {
  game.running = false;
  const s = document.getElementById('gameoverScreen');
  s.style.display = 'flex';
  document.getElementById('goTitle').textContent = won ? '🏆 فزت!' : '💀 خرجت!';
  document.getElementById('goStats').textContent = `Kills: ${game.kills} | Placed: ${won?'#1':'#'+game.alive}`;
  document.getElementById('goTitle').style.color = won ? '#ffd700' : '#e74c3c';
}

function drawWorld() {
  const cx = game.cam.x - W/2;
  const cy = game.cam.y - H/2;
  ctx.save();
  ctx.translate(-cx, -cy);

  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0,0,WORLD,WORLD);
  ctx.fillStyle = '#336622';
  for (let x=0;x<WORLD;x+=TILE) for(let y=0;y<WORLD;y+=TILE) {
    if ((x/TILE+y/TILE)%2===0) { ctx.fillStyle='#2a5518'; ctx.fillRect(x,y,TILE,TILE); }
  }
  ctx.strokeStyle='#1a3a0a'; ctx.lineWidth=8;
  ctx.strokeRect(0,0,WORLD,WORLD);

  const z = game.zone;
  ctx.save();
  ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2);
  ctx.strokeStyle='rgba(100,200,255,0.8)'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='rgba(100,200,255,0.05)'; ctx.fill();
  ctx.beginPath(); ctx.rect(0,0,WORLD,WORLD); ctx.arc(z.x,z.y,z.r,0,Math.PI*2,true);
  ctx.fillStyle='rgba(220,50,50,0.2)'; ctx.fill();
  ctx.restore();

  for (const h of game.houses) {
    ctx.fillStyle='#8B7355'; ctx.fillRect(h.x,h.y,h.w,h.h);
    ctx.strokeStyle='#5a4a2a'; ctx.lineWidth=2; ctx.strokeRect(h.x,h.y,h.w,h.h);
    ctx.fillStyle='#a0826d'; ctx.fillRect(h.x+4,h.y+4,h.w-8,12);
    ctx.fillStyle='#4a3520'; ctx.fillRect(h.x+h.w/2-10,h.y+h.h-25,20,25);
  }

  for (const r of game.rocks) {
    ctx.fillStyle='#777'; ctx.beginPath(); ctx.ellipse(r.x,r.y,r.r,r.r*0.7,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#999'; ctx.beginPath(); ctx.ellipse(r.x-3,r.y-3,r.r*0.5,r.r*0.35,0.3,0,Math.PI*2); ctx.fill();
  }

  for (const t of game.trees) {
    ctx.fillStyle='#2d1a0a'; ctx.beginPath(); ctx.ellipse(t.x,t.y,t.r*0.3,t.r*0.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle= t.type===0?'#1e6b1a':'#0d5c0d';
    ctx.beginPath(); ctx.arc(t.x,t.y-t.r*0.2,t.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=t.type===0?'#27962a':'#156b15';
    ctx.beginPath(); ctx.arc(t.x-4,t.y-t.r*0.3,t.r*0.6,0,Math.PI*2); ctx.fill();
  }

  for (const b of game.bullets) {
    if (b.trail.length < 2) continue;
    ctx.strokeStyle = b.isPlayer ? 'rgba(255,230,0,0.8)' : 'rgba(255,100,100,0.8)';
    ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(b.trail[0].x, b.trail[0].y);
    for (const pt of b.trail) ctx.lineTo(pt.x,pt.y);
    ctx.stroke();
    ctx.fillStyle = b.isPlayer ? '#ffee00' : '#ff6644';
    ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
  }

  for (const pt of game.particles) {
    ctx.globalAlpha = pt.life/30;
    ctx.fillStyle = pt.col;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*(pt.life/30),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (const en of game.enemies) {
    if (!en.alive) continue;
    ctx.save(); ctx.translate(en.x,en.y); ctx.rotate(en.angle+Math.PI/2);
    ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.ellipse(0,0,10,13,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5cba7'; ctx.beginPath(); ctx.arc(0,-16,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333'; ctx.fillRect(-5,-18,10,4);
    ctx.fillStyle='#555'; ctx.fillRect(-2,-8,4,14);
    ctx.restore();
    
    const hpPct = en.hp/en.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(en.x-18,en.y-28,36,5);
    ctx.fillStyle=hpPct>0.5?'#2ecc71':'#e74c3c'; ctx.fillRect(en.x-18,en.y-28,36*hpPct,5);
  }

  const p = game.player;
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle+Math.PI/2);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(2,2,14,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = p.aiming ? p.aimColor : p.color;
  ctx.beginPath(); ctx.ellipse(0,0,11,14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a3a5c'; ctx.fillRect(-6,-4,12,10);
  ctx.fillStyle='#f5cba7'; ctx.beginPath(); ctx.arc(0,-17,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2c3e50'; ctx.fillRect(-6,-22,12,8);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(-4,-21,8,5);
  ctx.fillStyle='#333'; ctx.fillRect(-3,-10,6,18);
  ctx.fillStyle='#222'; ctx.fillRect(-2,-10,4,4);
  ctx.restore();

  ctx.restore();
}

function drawMinimap() {
  const sc = 100/WORLD;
  mmCtx.clearRect(0,0,100,100);
  mmCtx.fillStyle='#1a2a1a'; mmCtx.fillRect(0,0,100,100);
  const z=game.zone;
  mmCtx.strokeStyle='rgba(100,200,255,0.8)'; mmCtx.lineWidth=1;
  mmCtx.beginPath(); mmCtx.arc(z.x*sc,z.y*sc,z.r*sc,0,Math.PI*2); mmCtx.stroke();
  for (const en of game.enemies) {
    if (!en.alive) continue;
    mmCtx.fillStyle='#e74c3c';
    mmCtx.fillRect(en.x*sc-2,en.y*sc-2,4,4);
  }
  mmCtx.fillStyle='#3498db';
  mmCtx.beginPath(); mmCtx.arc(game.player.x*sc,game.player.y*sc,4,0,Math.PI*2); mmCtx.fill();
}

function loop() {
  requestAnimationFrame(loop);
  if (!game.running && game._loopStarted) { if (!game.player) return; }
  if (game.running) updateGame();
  drawWorld();
  drawMinimap();
}
</script>
