<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battle Royale Qutibah</title>
<style>
    body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    canvas { display: block; }
    /* أزرار التحكم - بضغط مباشر */
    .btn { position: absolute; z-index: 20; touch-action: manipulation; user-select: none; }
    #joy { bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; }
    #fire { bottom: 50px; right: 50px; width: 100px; height: 100px; background: red; border-radius: 50%; color: white; text-align: center; line-height: 100px; font-weight: bold; }
    #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
</style>
</head>
<body>
<div id="ui">الدم: <span id="hp">100</span> | الأعداء: <span id="alive">19</span></div>
<div id="joy" class="btn"></div>
<div id="fire" class="btn">إطلاق</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w, h, player = {x: 500, y: 500, hp: 100}, enemies = [];

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// إنشاء أعداء يتحركون بعشوائية بعيداً عنك
for(let i=0; i<10; i++) enemies.push({x: Math.random()*2000, y: Math.random()*2000, vx: (Math.random()-0.5), vy: (Math.random()-0.5)});

function draw() {
    ctx.clearRect(0,0,w,h);
    // رسم اللاعب
    ctx.fillStyle = 'blue';
    ctx.fillRect(player.x - 20, player.y - 20, 40, 40);
    // رسم الأعداء
    ctx.fillStyle = 'red';
    enemies.forEach(e => {
        e.x += e.vx; e.y += e.vy;
        ctx.fillRect(e.x, e.y, 30, 30);
    });
    requestAnimationFrame(draw);
}
draw();

// التحكم المباشر بدون تعقيد
document.getElementById('fire').onpointerdown = () => console.log("إطلاق نار");
document.getElementById('joy').onpointermove = (e) => {
    player.x = e.clientX;
    player.y = e.clientY;
};
</script>
</body>
</html>
